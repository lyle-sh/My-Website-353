  <script>
    // ---- SCROLL REVEAL ----
    const reveals = document.querySelectorAll('.reveal');

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const siblings = [...entry.target.parentElement.children];
          const index = siblings.indexOf(entry.target);
          entry.target.style.transitionDelay = `${index * 0.08}s`;
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    reveals.forEach(el => revealObserver.observe(el));

    // ---- ACTIVE YEAR NAV ----
    const seasons = document.querySelectorAll('.gallery-season');
    const navBtns = document.querySelectorAll('.gnav-btn');

    const yearObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navBtns.forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('href') === `#${entry.target.id}`);
          });
        }
      });
    }, { threshold: 0.3 });

    seasons.forEach(s => yearObserver.observe(s));
  </script>
